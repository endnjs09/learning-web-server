<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>예측 결과</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5 text-center">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
      <div class="card-body py-5">
        <h2 class="mb-4">Result</h2>

        <div th:class="${prediction == '생존'} ? 'alert alert-success' : 'alert alert-danger'">
          <h1 class="display-4 fw-bold" th:text="${prediction}">생존</h1>
        </div>

        <p class="lead mt-4">
          Probability: <br>
          <span class="fs-2 fw-bold text-primary" th:text="${probability} + '%'">81.5%</span>
        </p>

        <div class="mt-5 d-grid gap-2">
          <a th:href="@{/titanic/form}" class="btn btn-outline-secondary">Restart</a>
          <a th:href="@{/list}" class="btn btn-primary">Back</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
